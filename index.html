<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To My World - Asifiwe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🏠</a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="my_projects.html" class="nav-link">Portfolio</a>
                </li>
                <li class="nav-item">
                    <a href="about_me.html" class="nav-link">About Me</a>
                </li>
                <li class="nav-item">
                    <a href="contact.html" class="nav-link">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Orbiting Photo Section -->
        <div class="orbit-section">
            <div class="orbit-container">
                <div class="center-circle"></div>
                <div class="orbit-ring"></div>
                <div class="orbiting-photo"></div>
            </div>
        </div>

        <!-- Welcome Text -->
        <h1 class="welcome-text">Welcome<br>To my<br>World</h1>

        <!-- Carousel Section -->
        <section class="carousel-section">
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="carousel-item">
                        <img src="https://i.imgur.com/K9sPQF3.jpeg" alt="Sunset Sky">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800" alt="Space 2">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800" alt="Space 3">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.unsplash.com/photo-1444080748397-f442aa95c3e5?w=800" alt="Space 4">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800" alt="Space 5">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800" alt="Nature 6">
                    </div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <button class="carousel-btn prev" id="prevBtn">👀</button>
            <button class="carousel-btn next" id="nextBtn">❤️</button>

            <!-- Carousel Indicators -->
            <div class="carousel-indicators">
                <span class="indicator active" data-index="0"></span>
                <span class="indicator" data-index="1"></span>
                <span class="indicator" data-index="2"></span>
                <span class="indicator" data-index="3"></span>
                <span class="indicator" data-index="4"></span>
                <span class="indicator" data-index="5"></span>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
